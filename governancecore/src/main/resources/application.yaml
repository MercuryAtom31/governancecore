spring:
  application:
    name: governancecore

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/governancecore}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    
# The issuer-uri property is used to specify the URL of the identity provider
# that issued the JWT tokens. By setting this property,
# we are telling the application to only accept tokens that were issued by this specific identity provider or realm. 
# This is a security measure to ensure that the application only accepts tokens from trusted sources.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/governance-core



# application.yaml or application.yml is where you configure how your app runs.

# application.yaml = Runtime configuration (when the app is running)

# This file answers questions like:

# What database should I connect to?

# What username/password should I use?

# Should Flyway run migrations on startup?

# What port should the server run on?

# Logging level? Security settings? Profiles?

# application.yaml configures how those dependencies behave at runtime.